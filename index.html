<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mesa de Ayuda · Excomin</title>
<script src="https://res.cdn.office.net/teams-js/2.19.0/js/MicrosoftTeams.min.js" integrity="sha384-jKAyaR0FpVOEAvOj5p10tXcAFGE+xLcyrJOTrtVcq2EUOnSjzOhgQUgQM67lQRoa" crossorigin="anonymous"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:        #0D1117;
    --card:      #161B22;
    --border:    #30363D;
    --blue:      #3A6BB8;
    --rust:      #B85C38;
    --text:      #E6EDF3;
    --muted:     #8B949E;
    --glow:      rgba(58,107,184,0.25);
  }

  body {
    font-family: 'Inter', 'Segoe UI', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }

  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 48px 40px 40px;
    max-width: 400px;
    width: 100%;
    text-align: center;
    box-shadow: 0 0 0 1px var(--border), 0 8px 32px rgba(0,0,0,0.4), 0 0 80px var(--glow);
    position: relative;
    overflow: hidden;
  }

  /* top accent line */
  .card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
    background: linear-gradient(90deg, var(--rust) 0%, var(--blue) 50%, var(--rust) 100%);
  }

  /* ---- Logo SVG ---- */
  .logo-wrap {
    width: 72px;
    height: 72px;
    margin: 0 auto 24px;
    border-radius: 18px;
    background: rgba(58,107,184,0.12);
    border: 1px solid rgba(58,107,184,0.3);
    display: flex;
    align-items: center;
    justify-content: center;
    transition: box-shadow .3s;
  }
  .logo-wrap:hover {
    box-shadow: 0 0 24px var(--glow);
  }
  .logo-wrap svg {
    width: 44px;
    height: 44px;
  }

  h1 {
    font-size: 20px;
    font-weight: 700;
    letter-spacing: -0.3px;
    color: var(--text);
    margin-bottom: 6px;
  }

  .company {
    font-size: 12px;
    font-weight: 500;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--blue);
    margin-bottom: 20px;
  }

  .divider {
    width: 40px;
    height: 1px;
    background: var(--border);
    margin: 0 auto 20px;
  }

  p {
    font-size: 14px;
    line-height: 1.65;
    color: var(--muted);
    margin-bottom: 32px;
  }

  .btn {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    background: var(--blue);
    color: #fff;
    font-family: inherit;
    font-size: 15px;
    font-weight: 600;
    border: none;
    border-radius: 10px;
    padding: 14px 28px;
    cursor: pointer;
    width: 100%;
    justify-content: center;
    transition: background .2s, transform .15s, box-shadow .2s;
    text-decoration: none;
  }
  .btn:hover {
    background: #4a7ecc;
    box-shadow: 0 4px 20px rgba(58,107,184,0.45);
    transform: translateY(-1px);
  }
  .btn:active {
    transform: translateY(0);
  }

  .btn svg { flex-shrink: 0; }

  .hint {
    margin-top: 16px;
    font-size: 12px;
    color: var(--muted);
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 5px;
  }

  .status-dot {
    width: 6px;
    height: 6px;
    background: #3FB950;
    border-radius: 50%;
    display: inline-block;
  }
</style>
</head>
